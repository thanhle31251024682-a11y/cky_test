<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Canteen AI – UEH</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap');

:root {
  --honeydew:   #F6FFEA;
  --soft-peach: #FFDE96;
  --coral:      #FA855A;
  --tomato:     #C93638;
  --sky:        #62C4DA;
  --bg:         #FFF8F0;
  --card:       #FFFFFF;
  --text:       #2D1B0E;
  --muted:      #8B6A55;
  --border:     #F0D9C8;
  --radius:     16px;
  --shadow:     0 4px 24px rgba(201,54,56,.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Be Vietnam Pro', sans-serif;
  min-height: 100vh;
}

header {
  background: linear-gradient(135deg, var(--tomato) 0%, var(--coral) 60%, var(--soft-peach) 100%);
  padding: 18px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 16px rgba(201,54,56,.25);
}
.logo { display:flex; align-items:center; gap:12px; }
.logo-icon {
  width:44px; height:44px; border-radius:12px;
  background: rgba(255,255,255,.25);
  display:grid; place-items:center; font-size:24px;
  backdrop-filter: blur(4px);
}
.logo-text { font-size:20px; font-weight:800; color:#fff; letter-spacing:.3px; }
.logo-sub  { font-size:11px; color:rgba(255,255,255,.8); font-weight:400; }
.badge {
  background: rgba(255,255,255,.2);
  border: 1px solid rgba(255,255,255,.35);
  color: #fff;
  font-size:11px; font-weight:600;
  padding:5px 14px; border-radius:20px;
  letter-spacing:.5px; text-transform:uppercase;
  backdrop-filter: blur(4px);
}

main {
  max-width: 1180px;
  margin: 0 auto;
  padding: 28px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
}
@media(max-width:820px){ main{ grid-template-columns:1fr; } }

.panel {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.panel-head {
  background: linear-gradient(90deg, var(--soft-peach) 0%, #fff8ee 100%);
  padding: 14px 20px;
  border-bottom: 1.5px solid var(--border);
  font-size:12px; font-weight:700;
  text-transform:uppercase; letter-spacing:.8px;
  color: var(--tomato);
  display:flex; align-items:center; gap:8px;
}
.panel-body { padding: 20px; }

.upload-zone {
  border: 2px dashed var(--coral);
  border-radius: var(--radius);
  min-height: 280px;
  display: flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:10px; cursor:pointer;
  transition: all .2s;
  position:relative; overflow:hidden;
  background: linear-gradient(135deg, #fff8f0 0%, #fff4e8 100%);
}
.upload-zone:hover { border-color:var(--tomato); background:#fff3e8; }
.upload-zone.has-image { border-style:solid; border-color:var(--border); }
.upload-zone img.preview {
  width:100%; height:100%; object-fit:contain;
  position:absolute; top:0; left:0;
  border-radius:calc(var(--radius) - 2px);
}
.upload-placeholder { text-align:center; z-index:1; }
.upload-placeholder.hidden { display:none; }
.upload-icon { font-size:44px; margin-bottom:8px; }
.upload-title { font-size:15px; font-weight:700; color:var(--tomato); }
.upload-sub { font-size:12px; color:var(--muted); margin-top:4px; }
#file-input { display:none; }

.btn-row { display:flex; gap:10px; margin-top:14px; }
.btn {
  flex:1; padding:11px; border-radius:10px;
  font-family:inherit; font-size:13px; font-weight:600;
  cursor:pointer; border:1.5px solid transparent;
  display:flex; align-items:center; justify-content:center;
  gap:7px; transition:all .15s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--tomato), var(--coral));
  color:#fff; border-color:transparent;
}
.btn-primary:hover { opacity:.9; transform:translateY(-1px); box-shadow:0 4px 14px rgba(201,54,56,.35); }
.btn-primary:disabled { opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }
.btn-secondary {
  background: var(--honeydew);
  color: var(--tomato);
  border-color: var(--coral);
}
.btn-secondary:hover { background:var(--soft-peach); }

.loading {
  display:none; align-items:center; gap:10px;
  font-size:13px; color:var(--muted); padding:12px 0;
}
.loading.show { display:flex; }
.spinner {
  width:18px; height:18px;
  border:2.5px solid var(--border);
  border-top-color:var(--coral);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }

.model-status {
  display:flex; align-items:center; gap:8px;
  font-size:12px; padding:8px 12px; border-radius:8px;
  margin-bottom:14px; font-weight:500;
}
.model-status.loading-model { background:#fff8e8; color:#b07a00; border:1px solid #ffd97a; }
.model-status.ready { background:#efffee; color:#1a7a3a; border:1px solid #a0e8b0; }
.model-status.error { background:#fff0f0; color:var(--tomato); border:1px solid #ffb8b8; }
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot.pulse { background:var(--soft-peach); animation:pulse 1s infinite; }
.dot.green { background:#22c55e; }
.dot.red   { background:var(--tomato); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.results-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
}
@media(max-width:540px){ .results-grid{ grid-template-columns:repeat(2,1fr); } }

.food-card {
  background: var(--card);
  border:1.5px solid var(--border);
  border-radius:12px; overflow:hidden;
  transition:transform .15s, box-shadow .15s;
  box-shadow:0 2px 8px rgba(201,54,56,.06);
}
.food-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(201,54,56,.15); }
.food-card.unknown { opacity:.55; }
.crop-img { width:100%; aspect-ratio:1; object-fit:cover; display:block; }
.crop-info { padding:10px; }
.crop-label {
  font-size:10px; font-weight:700; color:var(--coral);
  text-transform:uppercase; letter-spacing:.5px;
  margin-bottom:4px; display:flex; align-items:center; gap:4px;
}
.crop-name { font-size:13px; font-weight:700; color:var(--text); margin-bottom:2px; line-height:1.3; }
.crop-price { font-size:15px; font-weight:800; color:var(--tomato); }

.conf-wrap { margin-top:6px; }
.conf-bg { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.conf-fill { height:100%; border-radius:2px; transition:width .6s ease; }
.conf-text { font-size:10px; color:var(--muted); margin-top:2px; }

.bill {
  background: linear-gradient(135deg, #fff8f0 0%, var(--honeydew) 100%);
  border:1.5px solid var(--border);
  border-radius:var(--radius); padding:18px;
  margin-top:16px;
}
.bill-title {
  font-size:12px; font-weight:700; color:var(--tomato);
  text-transform:uppercase; letter-spacing:.6px; margin-bottom:14px;
  display:flex; align-items:center; gap:6px;
}
.bill-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 0; border-bottom:1px dashed var(--border);
}
.bill-row:last-of-type { border-bottom:none; }
.bill-name { font-size:13px; display:flex; align-items:center; gap:6px; color:var(--text); }
.bill-price { font-size:13px; font-weight:700; color:var(--tomato); }
.bill-total {
  display:flex; justify-content:space-between; align-items:center;
  padding-top:14px; margin-top:8px;
  border-top:2.5px solid var(--coral);
}
.bill-total-label { font-size:14px; font-weight:700; color:var(--text); }
.bill-total-amount { font-size:24px; font-weight:800; color:var(--tomato); }

.empty { text-align:center; padding:48px 20px; color:var(--muted); }
.empty-icon { font-size:48px; margin-bottom:12px; }
.empty-text { font-size:14px; font-weight:500; }

.error-box { background:#fff0f0; border:1.5px solid #ffb8b8; border-radius:10px; padding:12px 16px; font-size:13px; color:var(--tomato); margin-top:10px; font-weight:500; }
.error-box.hidden { display:none; }
.preview.hidden { display:none; }

footer { text-align:center; padding:20px; font-size:12px; color:var(--muted); border-top:1.5px solid var(--border); }
footer span { color:var(--coral); font-weight:600; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🍱</div>
    <div>
      <div class="logo-text">Canteen AI</div>
      <div class="logo-sub">Nhận diện món ăn tự động</div>
    </div>
  </div>
  <div class="badge">UEH · AI Project</div>
</header>

<main>
  <div>
    <div class="panel">
      <div class="panel-head">🍽️ 1. Tải ảnh khay cơm</div>
      <div class="panel-body">

        <div class="model-status loading-model" id="model-status">
          <div class="dot pulse"></div>
          <span>Đang tải model AI...</span>
        </div>

        <label for="file-input">
          <div class="upload-zone" id="drop-zone">
            <div class="upload-placeholder" id="placeholder">
              <div class="upload-icon">📸</div>
              <div class="upload-title">Chọn hoặc kéo thả ảnh</div>
              <div class="upload-sub">Chụp thẳng góc trên, đủ sáng, thấy rõ 5 ô khay</div>
            </div>
            <img class="preview hidden" id="preview" alt="preview"/>
          </div>
        </label>
        <input type="file" id="file-input" accept="image/*"/>

        <div class="btn-row">
          <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">📁 Chọn ảnh</button>
          <button class="btn btn-secondary" onclick="openCamera()">📷 Camera</button>
        </div>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          <span id="loading-text">Đang xử lý...</span>
        </div>
        <div class="error-box hidden" id="error-box"></div>

        <button class="btn btn-primary" id="analyze-btn" style="margin-top:14px;width:100%" disabled>
          🔍 Phân tích & tính tiền
        </button>
      </div>
    </div>
  </div>

  <div>
    <div class="panel">
      <div class="panel-head">🔬 2. Kết quả phân tích từng ngăn</div>
      <div class="panel-body">
        <div id="results-area">
          <div class="empty">
            <div class="empty-icon">🍽️</div>
            <div class="empty-text">Upload ảnh khay cơm để bắt đầu</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  Đồ án Trí tuệ nhân tạo · <span>UEH</span> &nbsp;·&nbsp;
  Model: <span>MobileNetV2 (tự train)</span> · Accuracy: <span>88.88%</span> ·
  5 ô cố định theo khay inox chuẩn
</footer>

<script>
const CLASS_NAMES = {
  0: "1. Cơm trắng",
  1: "10. Trứng chiên",
  2: "2. Đậu hũ sốt cà",
  3: "3. Cá hú kho",
  4: "4. Thịt kho trứng",
  5: "5. Thịt kho",
  6: "6. Canh chua",
  7: "7. Sườn nướng",
  8: "8. Canh rau",
  9: "9. Rau xào",
};

const MENU = {
  "1. Cơm trắng":      { price: 10000, display: "Cơm trắng",       emoji: "🍚" },
  "10. Trứng chiên":   { price: 25000, display: "Trứng chiên",      emoji: "🍳" },
  "2. Đậu hũ sốt cà":  { price: 25000, display: "Đậu hũ sốt cà",   emoji: "🟫" },
  "3. Cá hú kho":      { price: 30000, display: "Cá hú kho",        emoji: "🐟" },
  "4. Thịt kho trứng": { price: 30000, display: "Thịt kho trứng",   emoji: "🥚" },
  "5. Thịt kho":       { price: 25000, display: "Thịt kho",         emoji: "🥩" },
  "6. Canh chua":      { price: 15000, display: "Canh chua",        emoji: "🍲" },
  "7. Sườn nướng":     { price: 30000, display: "Sườn nướng",       emoji: "🍖" },
  "8. Canh rau":       { price:  7000, display: "Canh rau",         emoji: "🥬" },
  "9. Rau xào":        { price: 10000, display: "Rau xào",          emoji: "🥦" },
};

const CONF_THRESH = 0.40;
const IMG_SIZE    = 224;

// 5 ô CỐ ĐỊNH theo khay inox chuẩn (tỉ lệ 0–1 trên ảnh)
const FIXED_CELLS = [
  { label: "Ô 1",  box: [0.010, 0.010, 0.595, 0.415] },
  { label: "Ô 2",  box: [0.615, 0.010, 0.990, 0.275] },
  { label: "Ô 3",  box: [0.615, 0.295, 0.990, 0.555] },
  { label: "Ô 4",  box: [0.010, 0.435, 0.595, 0.990] },
  { label: "Ô 5",  box: [0.615, 0.575, 0.990, 0.840] },
];

let model = null;
const modelStatus = document.getElementById('model-status');

async function loadModel() {
  try {
    model = await tf.loadLayersModel('./model.json');
    const dummy = tf.zeros([1, IMG_SIZE, IMG_SIZE, 3]);
    model.predict(dummy).dispose();
    dummy.dispose();

    modelStatus.className = 'model-status ready';
    modelStatus.innerHTML = '<div class="dot green"></div><span>Model sẵn sàng ✓</span>';
    console.log('Model loaded (CNN tự train, 10 classes)');
  } catch(e) {
    modelStatus.className = 'model-status error';
    modelStatus.innerHTML = '<div class="dot red"></div><span>Lỗi tải model: ' + e.message + '</span>';
    console.error(e);
  }
}
loadModel();

const fileInput   = document.getElementById('file-input');
const dropZone    = document.getElementById('drop-zone');
const preview     = document.getElementById('preview');
const placeholder = document.getElementById('placeholder');
const analyzeBtn  = document.getElementById('analyze-btn');
const loadingEl   = document.getElementById('loading');
const loadingTxt  = document.getElementById('loading-text');
const errorBox    = document.getElementById('error-box');
const resultsArea = document.getElementById('results-area');

let currentImg = null;

fileInput.addEventListener('change', function(e) {
  if (e.target.files[0]) loadPreview(e.target.files[0]);
});
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.style.borderColor='var(--tomato)'; });
dropZone.addEventListener('dragleave', function() { dropZone.style.borderColor=''; });
dropZone.addEventListener('drop', function(e) {
  e.preventDefault(); dropZone.style.borderColor='';
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadPreview(f);
});

function loadPreview(file) {
  const url = URL.createObjectURL(file);
  const img  = new Image();
  img.onload = function() {
    currentImg = img;
    preview.src = url;
    placeholder.classList.add('hidden');
    preview.classList.remove('hidden');
    dropZone.classList.add('has-image');
    analyzeBtn.disabled = !model;
    errorBox.classList.add('hidden');
    resultsArea.innerHTML = '<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Ảnh đã tải · Nhấn Phân tích để bắt đầu</div></div>';
  };
  img.src = url;
}

function openCamera() {
  fileInput.setAttribute('capture','environment');
  fileInput.click();
}

function cropFixedCell(img, box) {
  const W = img.naturalWidth, H = img.naturalHeight;
  const bx1 = box[0], by1 = box[1], bx2 = box[2], by2 = box[3];
  const x1 = Math.round(bx1*W), y1 = Math.round(by1*H);
  const x2 = Math.round(bx2*W), y2 = Math.round(by2*H);

  const canvas = document.createElement('canvas');
  canvas.width  = x2 - x1;
  canvas.height = y2 - y1;
  canvas.getContext('2d').drawImage(img, x1, y1, x2-x1, y2-y1, 0, 0, x2-x1, y2-y1);
  return canvas;
}

async function classifyCell(canvas) {
  return tf.tidy(function() {
    const resized = tf.image.resizeBilinear(
      tf.browser.fromPixels(canvas), [IMG_SIZE, IMG_SIZE]
    );
    const normalized = resized.toFloat().div(255.0).expandDims(0);
    const preds = model.predict(normalized);
    const arr   = preds.dataSync();
    let maxVal = arr[0], idx = 0;
    for (let i = 1; i < arr.length; i++) {
      if (arr[i] > maxVal) { maxVal = arr[i]; idx = i; }
    }
    return { cls: CLASS_NAMES[idx], conf: maxVal };
  });
}

function fmtVND(n) { return n.toLocaleString('vi-VN') + 'đ'; }

analyzeBtn.addEventListener('click', analyze);

const LOADING_MSGS = [
  '✂️ Đang cắt 5 ô khay...',
  '🧠 CNN đang nhận diện món ăn...',
  '💰 Đang tính tiền...'
];
let loadIdx = 0, loadTimer = null;

async function analyze() {
  if (!currentImg || !model) return;
  analyzeBtn.disabled = true;
  errorBox.classList.add('hidden');
  loadIdx = 0;
  loadingTxt.textContent = LOADING_MSGS[0];
  loadingEl.classList.add('show');
  loadTimer = setInterval(function() {
    loadIdx = (loadIdx+1) % LOADING_MSGS.length;
    loadingTxt.textContent = LOADING_MSGS[loadIdx];
  }, 900);
  resultsArea.innerHTML = '<div class="empty"><div class="spinner" style="margin:0 auto;width:28px;height:28px"></div></div>';

  try {
    const items = [];
    let total = 0;

    for (let i = 0; i < FIXED_CELLS.length; i++) {
      const label = FIXED_CELLS[i].label;
      const box   = FIXED_CELLS[i].box;
      const canvas = cropFixedCell(currentImg, box);
      const result = await classifyCell(canvas);
      const cls = result.cls, conf = result.conf;
      const info  = MENU[cls] || { price:0, display:cls, emoji:'❓' };
      const valid = conf >= CONF_THRESH;
      const thumb = canvas.toDataURL('image/jpeg', 0.85);
      if (valid) total += info.price;
      items.push({
        idx: i+1, label: label, thumb: thumb, cls: cls,
        name: valid ? info.display : 'Không rõ',
        emoji: valid ? info.emoji : '❓',
        price: valid ? info.price : 0,
        conf: Math.round(conf*1000)/10,
        valid: valid
      });
    }

    renderResults(items, total);
  } catch(e) {
    errorBox.textContent = e.message;
    errorBox.classList.remove('hidden');
    resultsArea.innerHTML = '<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">' + e.message + '</div></div>';
  } finally {
    clearInterval(loadTimer);
    loadingEl.classList.remove('show');
    analyzeBtn.disabled = false;
  }
}

function renderResults(items, total) {
  const validItems = items.filter(function(it) { return it.valid; });

  let html = '<div class="results-grid">';
  items.forEach(function(it) {
    const confColor = it.conf >= 80 ? '#22c55e' : it.conf >= 50 ? '#FA855A' : '#C93638';
    html += ''
    + '<div class="food-card ' + (it.valid ? '' : 'unknown') + '">'
    +   '<img class="crop-img" src="' + it.thumb + '" alt="' + it.name + '"/>'
    +   '<div class="crop-info">'
    +     '<div class="crop-label">' + it.emoji + ' ' + it.label + '</div>'
    +     '<div class="crop-name">' + it.name + '</div>'
    +     (it.valid ? '<div class="crop-price">' + fmtVND(it.price) + '</div>' : '')
    +     '<div class="conf-wrap">'
    +       '<div class="conf-bg"><div class="conf-fill" style="width:' + it.conf + '%;background:' + confColor + '"></div></div>'
    +       '<div class="conf-text">Độ tin cậy: ' + it.conf + '%</div>'
    +     '</div>'
    +   '</div>'
    + '</div>';
  });
  html += '</div>';

  html += '<div class="bill"><div class="bill-title">🧾 Hóa đơn chi tiết</div>';
  validItems.forEach(function(it) {
    html += ''
    + '<div class="bill-row">'
    +   '<span class="bill-name">' + it.emoji + ' ' + it.name + '</span>'
    +   '<span class="bill-price">' + fmtVND(it.price) + '</span>'
    + '</div>';
  });
  html += ''
  + '<div class="bill-total">'
  +   '<span class="bill-total-label">Tổng cộng (' + validItems.length + ' món)</span>'
  +   '<span class="bill-total-amount">' + fmtVND(total) + '</span>'
  + '</div></div>';

  resultsArea.innerHTML = html;
}
</script>
</body>
</html>
